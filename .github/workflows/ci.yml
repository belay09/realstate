name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: belay_properties
          POSTGRES_USER: belay
          POSTGRES_PASSWORD: belay_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U belay -d belay_properties"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://belay:belay_test_password@localhost:5432/belay_properties
      JWT_SECRET_KEY: ci-test-secret-change-me
      APP_ENV: test
      DEBUG: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check app tests
      - name: Migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Pytest
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
