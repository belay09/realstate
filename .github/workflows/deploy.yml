# Deploy to EC2 after CI passes on main (push only).
# Configure repository secrets — see docs/GITHUB_DEPLOY.md

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production
    timeout-minutes: 45
    steps:
      - name: Check required secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "Missing EC2_HOST" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Missing EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing EC2_SSH_KEY" && exit 1)
          if [ "${{ secrets.EC2_USER }}" != "ec2-user" ]; then
            echo "Warning: this server uses ec2-user (Amazon Linux), not ubuntu."
          fi

      - name: Prepare SSH key file
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          if ssh-keygen -y -f ~/.ssh/ec2_deploy_key >/dev/null 2>&1; then
            echo "SSH private key format OK."
          elif [ -n "${{ secrets.EC2_SSH_PASSPHRASE }}" ]; then
            echo "Encrypted key; will use EC2_SSH_PASSPHRASE."
          else
            echo "EC2_SSH_KEY is invalid or encrypted. Re-paste the .pem or set EC2_SSH_PASSPHRASE."
            exit 1
          fi

      - name: Test SSH login
        run: |
          ssh -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'echo "SSH OK: $(whoami)@$(hostname)"'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          port: 22
          timeout: 60s
          command_timeout: 40m
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.EC2_APP_PATH }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/home/${{ secrets.EC2_USER }}/realstate"
            fi
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: $APP_DIR is not a git repo. Clone on EC2 first — see docs/GITHUB_DEPLOY.md"
              exit 1
            fi
            cd "$APP_DIR"
            echo "==> Pull latest main (deploy script may not exist until after this)..."
            git fetch origin main
            git checkout main
            git pull --ff-only origin main || git reset --hard origin/main
            if [ ! -f scripts/deploy-production.sh ]; then
              echo "ERROR: scripts/deploy-production.sh missing after pull. Check repo remote and branch."
              exit 1
            fi
            chmod +x scripts/deploy-production.sh scripts/deploy-migrate.sh
            ./scripts/deploy-production.sh
